name: Diagnostic Report Submission
description: Submit a diagnostic report ZIP file generated by SAMISH to help resolve sleep or wake issues.
title: "[Diag] Sleep/Wake Blockers Report"
labels: ["diagnostics"]
body:
  - type: markdown
    attributes:
      value: |
        Please attach the `SAMISH_Diagnostics_[timestamp].zip` file from your desktop to this issue.
  - type: textarea
    id: issue_description
    attributes:
      label: Describe the Issue
      description: A clear and concise description of what the sleep/wake issue is. E.g., "The computer wakes up immediately after sleeping," or "The computer does not enter sleep automatically."
    validations:
      required: true
  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to Reproduce (if known)
    validations:
      required: false
  - type: input
    id: windows_version
    attributes:
      label: Windows Version
      description: Optional if included in the ZIP.
    validations:
      required: false
  - type: input
    id: audio_hardware
    attributes:
      label: Hardware/Device type
    validations:
      required: false
  - type: dropdown
    id: samish_mode
    attributes:
      label: SAMISH Mode
      options:
        - Hidden
        - Interactive
    validations:
      required: false
